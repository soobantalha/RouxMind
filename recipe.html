<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RouxMind — Generate a Recipe</title>
<link rel="icon" href="logo.png" />
<link rel="stylesheet" href="style.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<div id="mouse-glow"></div>
<div id="onboarding-root"></div>

<div style="display:flex; min-height:100vh; position:relative; z-index:2;">

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar" id="sidebar" style="width:280px; flex-shrink:0; padding:1.25rem 0.75rem; display:flex; flex-direction:column; gap:1.25rem;">
    <a href="index.html" style="display:flex; align-items:center; gap:0.6rem; text-decoration:none; padding:0 0.5rem;">
      <img src="logo.png" alt="RouxMind" style="width:30px; height:30px; border-radius:8px;" />
      <span class="wordmark" style="font-size:1.2rem;">RouxMind</span>
    </a>

    <div id="sidebar-stats" class="glass-card"></div>

    <div>
      <div class="eyebrow" style="padding:0 1.1rem; margin-bottom:0.5rem;">Recent</div>
      <div id="sidebar-history" style="display:flex; flex-direction:column; gap:0.15rem; max-height:220px; overflow-y:auto;"></div>
    </div>

    <div>
      <div class="eyebrow" style="padding:0 1.1rem; margin-bottom:0.5rem;">⭐ Saved</div>
      <div id="sidebar-saved" style="display:flex; flex-direction:column; gap:0.15rem; max-height:220px; overflow-y:auto;"></div>
    </div>

    <div style="margin-top:auto; padding:0.75rem 1.1rem; border-top:1px solid var(--border-glass);">
      <a href="https://soobantalhatech.xyz" target="_blank" rel="noopener" style="display:flex; align-items:center; gap:0.5rem; text-decoration:none;">
        <img src="clogo.png" alt="" style="width:20px; height:20px; border-radius:5px;" />
        <span class="text-muted" style="font-size:0.75rem;">Sooban Talha Technologies</span>
      </a>
    </div>
  </aside>

  <!-- ============ MAIN ============ -->
  <main style="flex:1; padding:1.5rem 2rem 4rem; max-width:820px; margin:0 auto; width:100%;">
    <div style="display:flex; align-items:center; gap:1rem; margin-bottom:2rem;">
      <button id="sidebar-toggle" class="btn btn-ghost" style="display:none; padding:0.6rem;">☰</button>
      <div>
        <h1 class="display" style="font-size:1.8rem;">What are we cooking?</h1>
        <p style="font-size:0.9rem;">Type a dish, describe your ingredients, or snap a photo.</p>
      </div>
    </div>

    <!-- ---- Input mode tabs ---- -->
    <div class="glass-card" style="padding:1.75rem; margin-bottom:1.5rem;">
      <div style="display:flex; gap:0.5rem; margin-bottom:1.25rem;">
        <button class="btn btn-ghost mode-tab active" data-mode="text" style="flex:1; padding:0.7rem;">✏️ Text</button>
        <button class="btn btn-ghost mode-tab" data-mode="camera" style="flex:1; padding:0.7rem;">📷 Camera</button>
        <button class="btn btn-ghost mode-tab" data-mode="upload" style="flex:1; padding:0.7rem;">🖼️ Upload</button>
      </div>

      <div id="mode-text">
        <input id="dish-input" class="input-field" placeholder="e.g. Butter chicken, or 'leftover rice, eggs, spring onion'" />
      </div>

      <div id="mode-camera" style="display:none;">
        <video id="camera-feed" autoplay playsinline style="width:100%; border-radius:var(--radius-md); background:#000; max-height:320px;"></video>
        <canvas id="camera-canvas" style="display:none;"></canvas>
        <div style="display:flex; gap:0.75rem; margin-top:0.75rem;">
          <button id="camera-start" class="btn btn-ghost" style="flex:1;">Open Camera</button>
          <button id="camera-capture" class="btn btn-primary" style="flex:1; display:none;">📸 Capture</button>
        </div>
        <img id="camera-preview" style="display:none; width:100%; border-radius:var(--radius-md); margin-top:0.75rem;" />
      </div>

      <div id="mode-upload" style="display:none;">
        <label for="file-input" class="glass-card" style="display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2.5rem; cursor:pointer; border-style:dashed;">
          <span style="font-size:1.8rem; margin-bottom:0.5rem;">🖼️</span>
          <span class="text-muted" style="font-size:0.9rem;">Click to upload an image</span>
        </label>
        <input id="file-input" type="file" accept="image/*" style="display:none;" />
        <img id="upload-preview" style="display:none; width:100%; border-radius:var(--radius-md); margin-top:0.75rem;" />
      </div>

      <!-- ---- Sliders ---- -->
      <div style="display:grid; grid-template-columns:1fr; gap:1.25rem; margin-top:1.75rem;">
        <div>
          <div style="display:flex; justify-content:space-between; margin-bottom:0.4rem; font-size:0.88rem;">
            <span>Servings</span><span id="servings-val" class="text-glow">2</span>
          </div>
          <input id="servings-slider" type="range" min="1" max="10" value="2" class="slider" />
        </div>
        <div>
          <div style="display:flex; justify-content:space-between; margin-bottom:0.4rem; font-size:0.88rem;">
            <span>Spice level</span><span id="spice-val" class="text-glow">Medium</span>
          </div>
          <input id="spice-slider" type="range" min="1" max="5" value="3" class="slider" />
        </div>
        <div>
          <div style="display:flex; justify-content:space-between; margin-bottom:0.4rem; font-size:0.88rem;">
            <span>Time available</span><span id="time-val" class="text-glow">Fast</span>
          </div>
          <input id="time-slider" type="range" min="1" max="4" value="2" class="slider" />
        </div>
      </div>

      <button id="generate-btn" class="btn btn-ember" style="width:100%; margin-top:1.75rem; padding:1.05rem;">
        🍳 Generate Recipe
      </button>
    </div>

    <!-- ---- Loading state ---- -->
    <div id="loading-state" style="display:none; flex-direction:column; align-items:center; padding:3rem; gap:1rem;">
      <div class="loader-ring"></div>
      <p id="loading-msg" class="text-muted">Whisking up your recipe…</p>
    </div>

    <!-- ---- Error state ---- -->
    <div id="error-state" class="glass-card" style="display:none; padding:1.25rem; border-color:var(--accent-error); margin-bottom:1.5rem;">
      <p id="error-msg" style="color:var(--accent-error);"></p>
    </div>

    <!-- ---- Result ---- -->
    <div id="result-root"></div>
  </main>
</div>

<script src="app.js"></script>
<script>
(function () {
  let currentMode = "text";
  let currentImageBase64 = null;
  let cameraStream = null;
  let lastRecipe = null;

  // ---- Mode tabs ----
  document.querySelectorAll(".mode-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".mode-tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      currentMode = tab.dataset.mode;
      ["text", "camera", "upload"].forEach(m => {
        document.getElementById(`mode-${m}`).style.display = m === currentMode ? "block" : "none";
      });
    });
  });

  // ---- Sliders ----
  const spiceLabels = ["Mild", "Light", "Medium", "Hot", "Extra Hot"];
  const timeLabels = ["Quick", "Fast", "Standard", "Slow"];

  document.getElementById("servings-slider").addEventListener("input", e => {
    document.getElementById("servings-val").textContent = e.target.value;
  });
  document.getElementById("spice-slider").addEventListener("input", e => {
    document.getElementById("spice-val").textContent = spiceLabels[e.target.value - 1];
  });
  document.getElementById("time-slider").addEventListener("input", e => {
    document.getElementById("time-val").textContent = timeLabels[e.target.value - 1];
  });

  // ---- Camera ----
  document.getElementById("camera-start").addEventListener("click", async () => {
    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
      const video = document.getElementById("camera-feed");
      video.srcObject = cameraStream;
      document.getElementById("camera-start").style.display = "none";
      document.getElementById("camera-capture").style.display = "block";
    } catch (err) {
      alert("Couldn't access camera: " + err.message);
    }
  });

  document.getElementById("camera-capture").addEventListener("click", () => {
    const video = document.getElementById("camera-feed");
    const canvas = document.getElementById("camera-canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext("2d").drawImage(video, 0, 0);
    const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
    currentImageBase64 = dataUrl.split(",")[1];

    const preview = document.getElementById("camera-preview");
    preview.src = dataUrl;
    preview.style.display = "block";
    video.style.display = "none";

    if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
  });

  // ---- Upload ----
  document.getElementById("file-input").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      currentImageBase64 = reader.result.split(",")[1];
      const preview = document.getElementById("upload-preview");
      preview.src = reader.result;
      preview.style.display = "block";
    };
    reader.readAsDataURL(file);
  });

  // ---- Generate ----
  document.getElementById("generate-btn").addEventListener("click", async () => {
    const dishText = document.getElementById("dish-input").value.trim();
    const servings = document.getElementById("servings-slider").value;
    const spice = document.getElementById("spice-slider").value;
    const time = document.getElementById("time-slider").value;

    const usingImage = (currentMode === "camera" || currentMode === "upload") && currentImageBase64;

    if (!dishText && !usingImage) {
      alert("Please enter a dish name or provide an image.");
      return;
    }

    document.getElementById("loading-state").style.display = "flex";
    document.getElementById("error-state").style.display = "none";
    document.getElementById("result-root").innerHTML = "";

    try {
      const recipe = await generateRecipe({
        dishText: usingImage ? null : dishText,
        imageBase64: usingImage ? currentImageBase64 : null,
        servings, spice, time
      });
      lastRecipe = recipe;
      renderResult(recipe);
    } catch (err) {
      document.getElementById("error-msg").textContent = err.message;
      document.getElementById("error-state").style.display = "block";
    } finally {
      document.getElementById("loading-state").style.display = "none";
    }
  });

  function renderResult(recipe) {
    const root = document.getElementById("result-root");
    root.innerHTML = `
      <div class="glass-card reveal" style="padding:2rem;">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:1rem; flex-wrap:wrap;">
          <div>
            <div class="eyebrow" style="margin-bottom:0.5rem;">${escapeAttr(recipe.cuisine || "")} · ${escapeAttr(recipe.difficulty || "")}</div>
            <h2 class="display" style="font-size:1.6rem;">${escapeAttr(recipe.title || "")}</h2>
            <p style="font-size:0.92rem; margin-top:0.4rem;">${escapeAttr(recipe.description || "")}</p>
          </div>
          <div style="display:flex; gap:0.5rem;">
            <button id="save-recipe" class="btn btn-ghost" style="padding:0.6rem 1rem;">⭐ Save</button>
            <button id="download-pdf" class="btn btn-primary" style="padding:0.6rem 1rem;">📄 PDF</button>
          </div>
        </div>

        <div style="display:flex; gap:0.75rem; flex-wrap:wrap; margin:1.25rem 0;">
          <span class="stat-pill">👥 ${recipe.servings || "-"} servings</span>
          <span class="stat-pill">⏱️ ${escapeAttr(recipe.prepTime || "-")} prep</span>
          <span class="stat-pill">🔥 ${escapeAttr(recipe.cookTime || "-")} cook</span>
        </div>

        <h3 style="font-size:1.1rem; margin-bottom:0.75rem;">Ingredients</h3>
        <ul style="list-style:none; display:flex; flex-direction:column; gap:0.4rem; margin-bottom:1.5rem;">
          ${(recipe.ingredients || []).map(i => `<li style="font-size:0.92rem;">• <strong>${escapeAttr(i.amount)}</strong> ${escapeAttr(i.item)}</li>`).join("")}
        </ul>

        <h3 style="font-size:1.1rem; margin-bottom:0.75rem;">Steps</h3>
        <ol style="display:flex; flex-direction:column; gap:0.75rem; margin-bottom:1.5rem; padding-left:1.2rem;">
          ${(recipe.steps || []).map(s => `<li style="font-size:0.92rem;">${escapeAttr(s.instruction)}${s.duration ? ` <span class="text-muted">(${escapeAttr(s.duration)})</span>` : ""}</li>`).join("")}
        </ol>

        ${recipe.tips?.length ? `
          <h3 style="font-size:1.1rem; margin-bottom:0.75rem;">Chef's Tips</h3>
          <ul style="list-style:none; display:flex; flex-direction:column; gap:0.4rem;">
            ${recipe.tips.map(t => `<li style="font-size:0.92rem;">💡 ${escapeAttr(t)}</li>`).join("")}
          </ul>` : ""}
      </div>`;

    document.getElementById("download-pdf").addEventListener("click", () => downloadRecipePDF(lastRecipe));
    document.getElementById("save-recipe").addEventListener("click", () => {
      RM.saveRecipe(lastRecipe);
      renderSaved();
    });
  }

  function escapeAttr(s) {
    const div = document.createElement("div");
    div.textContent = s ?? "";
    return div.innerHTML;
  }

  // ---- Mobile sidebar toggle visibility ----
  function checkMobile() {
    document.getElementById("sidebar-toggle").style.display = window.innerWidth <= 768 ? "inline-flex" : "none";
  }
  checkMobile();
  window.addEventListener("resize", checkMobile);
})();
</script>
</body>
</html>
